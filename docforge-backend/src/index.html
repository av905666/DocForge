<!DOCTYPE html>
<html>
<head>
  <title>DocForge Merge</title>
</head>
<body>
  <h1>Merge PDFs</h1>
  <form action="http://localhost:5000/api/pdf/merge" method="post" enctype="multipart/form-data">
    <input type="file" name="files" multiple accept="application/pdf">
    <button type="submit">Merge PDFs</button>
  </form>
</body>
</html>
